<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendOS Billionaire UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A0A0B; }
        .glass { background: rgba(22, 22, 24, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(35, 35, 38, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- CUSTOM COMPONENTS ---

        const GlassCard = ({ children, className = "" }) => (
            <div className={`glass rounded-2xl p-6 ${className}`}>
                {children}
            </div>
        );

        const NavItem = ({ iconName, label, active = false }) => (
            <div className={`flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition-all duration-200 group ${active ? 'bg-indigo-600/10 text-indigo-400' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`}>
                <i data-lucide={iconName} className={`w-5 h-5 ${active ? 'text-indigo-400' : 'group-hover:text-white'}`}></i>
                <span className="font-medium text-sm">{label}</span>
            </div>
        );

        const BillionaireFintech = () => {
            React.useEffect(() => {
                lucide.createIcons();
            }, []);

            return (
                <div className="min-h-screen text-white p-4 lg:p-8">
                    {/* SIDEBAR (Desktop) */}
                    <aside className="fixed left-0 top-0 bottom-0 w-64 border-r border-[#1C1C1E] bg-[#0A0A0B] p-6 hidden lg:flex flex-col">
                        <div className="flex items-center gap-3 mb-10 px-2">
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold italic">S</div>
                            <span className="text-xl font-bold tracking-tight">SpendOS</span>
                        </div>
                        <nav className="flex-1 space-y-2">
                            <NavItem iconName="layout-dashboard" label="Overview" active={true} />
                            <NavItem iconName="pie-chart" label="Ledger" />
                            <NavItem iconName="credit-card" label="Corporate Cards" />
                            <NavItem iconName="users" label="Team" />
                            <NavItem iconName="settings" label="Governance" />
                        </nav>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="lg:ml-64 max-w-7xl mx-auto">
                        <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
                            <div>
                                <h1 className="text-3xl font-bold tracking-tight mb-1">Financial Pulse</h1>
                                <p className="text-gray-500 text-sm">Real-time spending across 4 global subsidiaries.</p>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="relative group hidden md:block">
                                    <i data-lucide="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 w-4 h-4"></i>
                                    <input type="text" placeholder="Search transactions..." className="bg-[#161618] border border-[#232326] rounded-xl py-2 pl-10 pr-4 text-sm w-64 focus:outline-none focus:border-indigo-500/50" />
                                </div>
                                <div className="flex items-center gap-3 pl-4 border-l border-[#232326]">
                                    <div className="text-right">
                                        <p className="text-sm font-bold">Zuck.eth</p>
                                        <p className="text-[10px] text-gray-500 font-mono uppercase tracking-widest">Admin</p>
                                    </div>
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-600 to-purple-500 p-px">
                                        <div className="w-full h-full rounded-[11px] bg-[#0A0A0B] flex items-center justify-center text-xs font-bold">JZ</div>
                                    </div>
                                </div>
                            </div>
                        </header>

                        {/* METRICS */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                            <GlassCard className="border-l-4 border-l-indigo-600">
                                <p className="text-gray-400 text-xs font-medium uppercase tracking-wider mb-4">Total Cash Outflow</p>
                                <h2 className="text-3xl font-bold mb-1">₹4,20,89,120</h2>
                                <p className="text-[10px] text-green-400 font-bold tracking-wide">+12.4% FROM LAST MONTH</p>
                            </GlassCard>
                            <GlassCard>
                                <p className="text-gray-400 text-xs font-medium uppercase tracking-wider mb-4">Active Cards</p>
                                <h2 className="text-3xl font-bold mb-1">1,248</h2>
                                <p className="text-[10px] text-gray-500 font-mono">12 DEPARTMENTS LIVE</p>
                            </GlassCard>
                            <GlassCard className="bg-gradient-to-br from-indigo-600 to-purple-700 !p-0 overflow-hidden relative group cursor-pointer">
                                <div className="p-6 relative z-10">
                                    <span className="text-white/70 text-xs font-medium uppercase tracking-wider">Smart Auditor AI</span>
                                    <h2 className="text-2xl font-bold mt-4">14 Risks Detected</h2>
                                </div>
                                <div className="absolute top-[-20%] right-[-10%] w-40 h-40 bg-white/10 rounded-full blur-3xl group-hover:bg-white/20 transition-all duration-500"></div>
                            </GlassCard>
                        </div>

                        {/* QUEUE */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 space-y-6">
                                <h3 className="text-lg font-bold">Pending Approvals</h3>
                                {[
                                    { vendor: "Amazon AWS", name: "Pratham (S)", amount: "₹45,200", cat: "Infrastructure" },
                                    { vendor: "Apple Inc.", name: "Varun (V)", amount: "₹1,20,000", cat: "Hardware" },
                                    { vendor: "Starbucks", name: "Siddharth (S)", amount: "₹8,400", cat: "Food & Bev" },
                                ].map((item, i) => (
                                    <div key={i} className="flex items-center justify-between p-5 bg-[#161618] border border-[#232326] rounded-2xl hover:border-indigo-500/30 transition-all group cursor-pointer">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 rounded-xl bg-[#1C1C1E] flex items-center justify-center text-indigo-400 group-hover:scale-110 transition-transform">
                                                <i data-lucide="pie-chart"></i>
                                            </div>
                                            <div>
                                                <p className="font-bold text-sm">{item.vendor}</p>
                                                <p className="text-xs text-gray-500">{item.name} • {item.cat}</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <p className="font-bold text-sm">{item.amount}</p>
                                            <p className="text-[10px] text-gray-600 uppercase font-mono tracking-widest">2 MINS AGO</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="space-y-6">
                                <h3 className="text-lg font-bold">Ledger Balance</h3>
                                <GlassCard className="!p-0">
                                    <div className="p-6 border-b border-[#232326]">
                                        <p className="text-gray-400 text-xs font-medium uppercase tracking-wider mb-2">Corporate Treasury</p>
                                        <h2 className="text-4xl font-bold tracking-tighter">₹84.22 Cr</h2>
                                    </div>
                                    <div className="p-6 space-y-4">
                                        <div className="flex justify-between text-xs text-gray-400"><p>Operating Expenses</p><p className="text-red-400">-₹12.4M</p></div>
                                        <div className="flex justify-between text-xs text-gray-400"><p>Stripe Inbound</p><p className="text-green-400">+₹52.8M</p></div>
                                    </div>
                                </GlassCard>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BillionaireFintech />);
    </script>
</body>
</html>
