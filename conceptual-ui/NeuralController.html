<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendOS: Neural Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --hyper-bg: #020203; --neon-blue: #00f2ff; --neon-purple: #bc13fe; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--hyper-bg); color: white; overflow: hidden; cursor: crosshair; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .hyper-glass {
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .neural-node {
            background: radial-gradient(circle at center, var(--neon-blue) 0%, transparent 70%);
            filter: blur(20px);
            opacity: 0.15;
        }

        .tilt-container { perspective: 1000px; }
        .tilt-card { transform-style: preserve-3d; transition: transform 0.1s ease; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin-slow { animation: rotate 20s linear infinite; }

        .scanline {
            width: 100%; height: 100px; z-index: 100; pointer-events: none;
            background: linear-gradient(0deg, rgba(0, 242, 255, 0.02) 0%, transparent 100%);
            position: absolute; animation: scan 8s linear infinite;
        }
        @keyframes scan { from { top: -100px; } to { top: 100%; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, useMotionValue, useSpring, useTransform } = FramerMotion;

        const InteractiveCard = ({ children, className = "" }) => {
            const x = useMotionValue(0);
            const y = useMotionValue(0);
            const rotateX = useSpring(useTransform(y, [-100, 100], [10, -10]), { stiffness: 100, damping: 30 });
            const rotateY = useSpring(useTransform(x, [-100, 100], [-10, 10]), { stiffness: 100, damping: 30 });

            function onMouseMove(event) {
                const rect = event.currentTarget.getBoundingClientRect();
                x.set(event.clientX - rect.left - rect.width / 2);
                y.set(event.clientY - rect.top - rect.height / 2);
            }

            return (
                <motion.div 
                    onMouseMove={onMouseMove}
                    onMouseLeave={() => { x.set(0); y.set(0); }}
                    style={{ rotateX, rotateY }}
                    className={`hyper-glass rounded-[40px] p-8 relative overflow-hidden group ${className}`}
                >
                    {children}
                    <div className="absolute inset-0 bg-gradient-to-br from-white/[0.05] to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
                </motion.div>
            );
        };

        const NeuralController = () => {
            useEffect(() => { lucide.createIcons(); }, []);

            return (
                <div className="h-screen w-screen flex flex-col p-10 overflow-hidden relative">
                    
                    {/* BACKGROUND ORBS */}
                    <div className="absolute top-[-10%] right-[-10%] w-[600px] h-[600px] neural-node spin-slow"></div>
                    <div className="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] neural-node" style={{background: 'radial-gradient(circle, var(--neon-purple) 0%, transparent 70%)'}}></div>

                    {/* TOP STATUS BAR */}
                    <header className="flex justify-between items-center mb-12 relative z-10">
                        <div className="flex items-center gap-6">
                            <div className="w-14 h-14 bg-white rounded-3xl flex items-center justify-center mix-blend-difference">
                                <i data-lucide="shield-check" className="text-black w-8 h-8"></i>
                            </div>
                            <div>
                                <h2 className="text-xs font-black tracking-[0.5em] text-cyan-400 uppercase mb-1">Authenticated Terminal</h2>
                                <h1 className="text-2xl font-bold tracking-tighter">SPEND_OS // V1.0.4</h1>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <div className="px-6 py-3 hyper-glass rounded-full border-cyan-500/20 flex items-center gap-3">
                                <div className="w-2 h-2 rounded-full bg-cyan-500 animate-ping"></div>
                                <span className="text-[10px] font-bold mono">LEDGER_STABLE: 100%</span>
                            </div>
                            <div className="w-12 h-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/20 cursor-pointer transition-all">
                                <i data-lucide="power" className="w-5 h-5"></i>
                            </div>
                        </div>
                    </header>

                    {/* MAIN GRID */}
                    <div className="flex-1 grid grid-cols-12 gap-8 relative z-10">
                        
                        {/* LEFT: NEURAL CORE */}
                        <div className="col-span-4 flex flex-col gap-8">
                            <InteractiveCard className="flex-1 border-cyan-500/10">
                                <div className="flex justify-between items-start mb-12">
                                    <h3 className="text-xl font-bold tracking-tight">Active Liquidity</h3>
                                    <i data-lucide="orbit" className="text-cyan-400 animate-spin-slow"></i>
                                </div>
                                <div className="mb-12">
                                    <span className="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-4">Total Assets Under Mgmt</span>
                                    <h2 className="text-7xl font-black tracking-[-0.08em] mono">₹842.1M</h2>
                                </div>
                                <div className="space-y-4">
                                    <div className="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                                        <motion.div initial={{width: 0}} animate={{width: '74%'}} transition={{duration: 2}} className="h-full bg-gradient-to-r from-cyan-500 to-purple-500"></motion.div>
                                    </div>
                                    <div className="flex justify-between text-[10px] font-bold tracking-tighter text-gray-500">
                                        <span>SYSTEM_LOAD: 24%</span>
                                        <span>UPTIME: 99.999%</span>
                                    </div>
                                </div>
                            </InteractiveCard>

                            <motion.div whileHover={{ scale: 0.98 }} className="h-32 bg-white text-black rounded-[40px] p-8 flex items-center justify-between cursor-pointer">
                                <div>
                                    <p className="text-[10px] font-black uppercase tracking-widest mb-1 opacity-50">Instant Action</p>
                                    <h4 className="text-xl font-bold tracking-tight">Reconcile Books</h4>
                                </div>
                                <i data-lucide="arrow-right-circle" className="w-10 h-10"></i>
                            </motion.div>
                        </div>

                        {/* CENTER: THE FEED */}
                        <div className="col-span-5">
                            <InteractiveCard className="h-full !p-0">
                                <div className="p-8 border-b border-white/5 flex justify-between items-center">
                                    <h3 className="text-xl font-bold tracking-tight">Neural Audit Stream</h3>
                                    <div className="flex gap-2">
                                        <div className="w-3 h-3 rounded-full bg-red-500/20 border border-red-500/50"></div>
                                        <div className="w-3 h-3 rounded-full bg-yellow-500/20 border border-yellow-500/50"></div>
                                    </div>
                                </div>
                                <div className="p-4 space-y-4 max-h-[500px] overflow-y-auto">
                                    {[
                                        { title: "Anomaly: High Surge Uber", time: "14:22", risk: "LOW" },
                                        { title: "Sync: AWS Cloudfront", time: "14:18", risk: "NONE" },
                                        { title: "Alert: Restricted Vendor", time: "14:02", risk: "HIGH" },
                                        { title: "Ledger: Treasury Rebalance", time: "13:44", risk: "NONE" },
                                        { title: "Alert: SLA Breach (Marketing)", time: "12:12", risk: "MEDIUM" },
                                    ].map((item, i) => (
                                        <motion.div 
                                            key={i}
                                            initial={{ x: -20, opacity: 0 }}
                                            animate={{ x: 0, opacity: 1 }}
                                            transition={{ delay: i * 0.1 }}
                                            className="p-6 rounded-3xl bg-white/[0.02] border border-white/5 flex justify-between items-center hover:bg-white/5 transition-all cursor-pointer"
                                        >
                                            <div className="flex items-center gap-4">
                                                <div className={`w-2 h-2 rounded-full ${item.risk === 'HIGH' ? 'bg-red-500 shadow-[0_0_10px_red]' : 'bg-cyan-500 shadow-[0_0_10px_cyan]'}`}></div>
                                                <div>
                                                    <p className="text-sm font-bold tracking-tight">{item.title}</p>
                                                    <p className="text-[10px] font-mono text-gray-500 uppercase">{item.time} // UTC+5:30</p>
                                                </div>
                                            </div>
                                            <span className="text-[10px] font-black px-3 py-1 rounded-full bg-white/5 border border-white/10 text-gray-400">{item.risk}</span>
                                        </motion.div>
                                    ))}
                                </div>
                            </InteractiveCard>
                        </div>

                        {/* RIGHT: GEOMETRIC STATS */}
                        <div className="col-span-3 flex flex-col gap-8">
                            <InteractiveCard className="bg-gradient-to-tr from-purple-600/20 to-cyan-500/10 border-purple-500/20">
                                <div className="text-center py-12">
                                    <div className="relative inline-block mb-8">
                                        <div className="w-24 h-24 rounded-full border-2 border-dashed border-cyan-500/30 spin-slow"></div>
                                        <div className="absolute inset-0 flex items-center justify-center">
                                            <i data-lucide="brain-circuit" className="w-10 h-10 text-cyan-400"></i>
                                        </div>
                                    </div>
                                    <h4 className="text-2xl font-bold tracking-tighter mb-2">Policy Engine</h4>
                                    <p className="text-xs text-gray-400 leading-relaxed">System is currently processing 1,248 heuristics per second.</p>
                                </div>
                            </InteractiveCard>

                            <InteractiveCard className="flex-1">
                                <h4 className="text-[10px] font-black uppercase tracking-widest text-gray-500 mb-8">Quick Terminal</h4>
                                <div className="bg-black/60 rounded-2xl p-4 border border-white/5 min-h-[150px] font-mono text-[11px] text-cyan-500/80 leading-relaxed">
                                    <p>> spendos.ledger.verify()</p>
                                    <p className="text-gray-600">[INFO] Scanning 4,201 blocks...</p>
                                    <p className="text-emerald-500">[SUCCESS] Hash match found.</p>
                                    <p className="text-gray-600">[INFO] Optimizing connection pool...</p>
                                    <p className="animate-pulse">_</p>
                                </div>
                            </InteractiveCard>
                        </div>

                    </div>

                    {/* BOTTOM NAV */}
                    <footer className="mt-auto flex justify-center pb-4 relative z-10">
                        <div className="hyper-glass px-10 py-4 rounded-full flex gap-12 border-white/10">
                            {['Command', 'Ledger', 'Policies', 'Vault', 'Nodes'].map((tab, i) => (
                                <div key={tab} className={`text-[10px] font-black uppercase tracking-[0.3em] cursor-pointer transition-all hover:text-white ${i === 0 ? 'text-white' : 'text-gray-600'}`}>
                                    {tab}
                                </div>
                            ))}
                        </div>
                    </footer>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NeuralController />);
    </script>
</body>
</html>
